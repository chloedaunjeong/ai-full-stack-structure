<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcare AI Full-Stack Structure</title>
  <style>
    :root {
      --bg: #f5fafc;
      --surface: #ffffff;
      --surface-soft: #f8fcfd;
      --ink: #102a43;
      --muted: #5f7482;
      --line: #d9e7ed;
      --navy: #123047;
      --green: #0f8f7d;
      --cyan: #138aa1;
      --blue: #2563eb;
      --slate: #2f7c8f;
      --purple: #7461c9;
      --orange: #d97635;
      --rose: #d94f73;
      --shadow: 0 18px 42px rgba(16, 42, 67, 0.12);
      --soft-shadow: 0 10px 24px rgba(16, 42, 67, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 7% 0%, rgba(15, 143, 125, 0.15), transparent 28rem),
        radial-gradient(circle at 98% 10%, rgba(37, 99, 235, 0.1), transparent 30rem),
        linear-gradient(180deg, #eef8fb 0%, var(--bg) 44%, #f9fcfd 100%);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.62;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(1260px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 60px;
    }

    .shell {
      overflow: hidden;
      border: 1px solid rgba(217, 231, 237, 0.95);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    header {
      position: relative;
      padding: clamp(30px, 5vw, 58px) clamp(24px, 5vw, 54px) 26px;
      text-align: center;
    }

    .language-toggle {
      position: absolute;
      top: 20px;
      right: 22px;
      display: inline-flex;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      box-shadow: var(--soft-shadow);
    }

    .language-toggle button {
      min-width: 48px;
      padding: 8px 12px;
      border: 0;
      background: transparent;
      color: #426579;
      cursor: pointer;
      font-weight: 900;
      transition: background 160ms ease, color 160ms ease;
    }

    .language-toggle button.active {
      background: var(--navy);
      color: #ffffff;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(2.25rem, 5vw, 4.7rem);
      line-height: 1.03;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 6px;
      font-size: clamp(1.45rem, 2.6vw, 2.2rem);
      letter-spacing: 0;
      line-height: 1.2;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 1.13rem;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .subtitle {
      margin-bottom: 0;
      color: #49677a;
      font-size: clamp(1.03rem, 2vw, 1.45rem);
      font-weight: 800;
    }

    .section {
      padding: 24px clamp(18px, 4vw, 46px);
    }

    .demo-bar {
      display: grid;
      grid-template-columns: minmax(120px, 0.8fr) minmax(360px, 2.6fr) minmax(160px, 0.9fr);
      gap: 18px;
      align-items: center;
      padding: 18px 22px;
      border-radius: 20px;
      background: var(--navy);
      color: #ffffff;
      box-shadow: var(--soft-shadow);
    }

    .demo-bar strong {
      font-size: 1.05rem;
    }

    .demo-bar.demo-only {
      display: block;
      text-align: center;
    }

    .demo-bar.demo-only strong {
      display: block;
      font-size: 1.25rem;
    }

    .demo-sequence {
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 900;
      white-space: nowrap;
    }

    .demo-view {
      color: #c6f6d5;
      font-size: 0.93rem;
      font-weight: 800;
      text-align: right;
    }

    .flow-scroll {
      overflow-x: auto;
      margin-top: 28px;
      padding: 4px 4px 18px;
    }

    .flow-row {
      min-width: 1120px;
      display: grid;
      grid-template-columns: repeat(7, minmax(132px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .supporting-layers-band {
      min-width: 1120px;
      display: grid;
      place-items: center;
      min-height: 62px;
      margin-top: 12px;
      border: 5px solid #111827;
      border-top-width: 0;
      border-radius: 0 0 50% 50% / 0 0 80% 80%;
      color: #f3d400;
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 850;
      letter-spacing: 0;
    }

    .flow-card {
      position: relative;
      min-height: 130px;
      display: grid;
      place-items: center;
      padding: 16px 12px;
      border-radius: 22px;
      background: var(--accent);
      color: #ffffff;
      text-align: center;
      box-shadow: var(--soft-shadow);
    }

    .flow-card:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -25px;
      top: 50%;
      z-index: 2;
      color: #92a5b0;
      font-size: 2rem;
      font-weight: 900;
      transform: translateY(-50%);
    }

    .flow-icon {
      display: block;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .flow-title {
      display: block;
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.18;
    }

    .flow-subtitle {
      display: block;
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .section-heading {
      margin: 18px 0 22px;
      text-align: center;
    }

    .section-heading p {
      margin-bottom: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 18px 0 22px;
    }

    .button {
      min-height: 42px;
      padding: 10px 15px;
      border: 0;
      border-radius: 999px;
      background: var(--navy);
      color: #ffffff;
      cursor: pointer;
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      background: #0b2235;
      box-shadow: 0 10px 22px rgba(16, 42, 67, 0.18);
      transform: translateY(-1px);
    }

    .button.secondary {
      background: #e7f1f5;
      color: #2a4d60;
    }

    .button.secondary:hover {
      background: #d8e8ee;
    }

    .button.active {
      background: var(--navy);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(16, 42, 67, 0.18);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      padding: 18px;
      border: 2px solid color-mix(in srgb, var(--accent) 30%, #ffffff);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: var(--soft-shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .summary-card:hover,
    .summary-card.active {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stage-number {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 18%, #ffffff);
      color: var(--accent);
      font-weight: 900;
    }

    .summary-icon {
      font-size: 1.7rem;
    }

    .summary-card h3 {
      font-size: 1.13rem;
    }

    .summary-card p {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 750;
    }

    .preview-list {
      margin: 0 0 16px;
      padding-left: 18px;
      color: #315569;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .preview-list li {
      margin: 4px 0;
    }

    .card-action {
      margin-top: auto;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .panel-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 260ms ease;
    }

    .panel-wrap.open {
      grid-template-rows: 1fr;
    }

    .panel-inner {
      overflow: hidden;
    }

    .detail-panel {
      margin-top: 24px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid var(--line);
      border-left: 8px solid var(--panel-accent, var(--green));
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .detail-kicker {
      margin-bottom: 5px;
      color: var(--panel-accent, var(--green));
      font-size: 0.92rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .close-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      background: #eef5f8;
      color: #29495a;
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 900;
    }

    .detail-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 18px;
    }

    .detail-tab {
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: #315569;
      cursor: pointer;
      font-weight: 850;
    }

    .detail-tab.active {
      border-color: var(--panel-accent, var(--green));
      background: color-mix(in srgb, var(--panel-accent, var(--green)) 12%, #ffffff);
      color: var(--panel-accent, var(--green));
    }

    .detail-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.82fr);
      gap: 18px;
      align-items: start;
    }

    .info-card,
    .hierarchy-box,
    .support-output,
    .footer-summary {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-soft);
      padding: 18px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .text-list {
      margin: 0;
      padding-left: 20px;
      color: #315569;
      font-weight: 700;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .chip {
      padding: 8px 10px;
      border: 1px solid #cbdfe7;
      border-radius: 999px;
      background: #ffffff;
      color: #2d5264;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 850;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .chip:hover,
    .chip.active {
      border-color: var(--panel-accent, var(--green));
      background: color-mix(in srgb, var(--panel-accent, var(--green)) 12%, #ffffff);
      color: var(--panel-accent, var(--green));
      transform: translateY(-1px);
    }

    .hierarchy-output {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #ffffff;
      color: #315569;
      font-weight: 700;
      transition: opacity 160ms ease;
    }

    .hierarchy-helper {
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .hierarchy-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .hierarchy-card-button {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 12px;
      border: 1px solid #cbdfe7;
      border-radius: 16px;
      background: #ffffff;
      color: #264b5d;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 6px 16px rgba(16, 42, 67, 0.06);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .hierarchy-card-button:hover,
    .hierarchy-card-button.active {
      border-color: var(--panel-accent, var(--green));
      background: color-mix(in srgb, var(--panel-accent, var(--green)) 10%, #ffffff);
      box-shadow: 0 10px 22px rgba(16, 42, 67, 0.1);
      transform: translateY(-1px);
    }

    .hierarchy-card-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel-accent, var(--green)) 14%, #ffffff);
      font-size: 1.1rem;
    }

    .hierarchy-card-name {
      display: block;
      font-weight: 900;
      line-height: 1.2;
    }

    .hierarchy-card-subtitle {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 750;
      line-height: 1.3;
    }

    .selected-detail {
      display: grid;
      gap: 12px;
    }

    .selected-detail-title {
      margin-bottom: 2px;
      color: var(--panel-accent, var(--green));
      font-size: 1.35rem;
      font-weight: 900;
    }

    .detail-row {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-soft);
    }

    .detail-row-label {
      display: block;
      margin-bottom: 4px;
      color: #426579;
      font-size: 0.84rem;
      font-weight: 900;
    }

    .detail-row-text {
      color: #264b5d;
      font-weight: 750;
    }

    .related-examples-box {
      padding: 14px;
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--green)) 22%, var(--line));
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel-accent, var(--green)) 8%, #ffffff);
    }

    .related-examples-title {
      display: block;
      margin-bottom: 10px;
      color: #29495a;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .related-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .related-tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--green)) 22%, #d8e7ed);
      border-radius: 999px;
      background: #ffffff;
      color: #315569;
      font-size: 0.86rem;
      font-weight: 850;
    }

    .support-panel {
      margin-top: 22px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .support-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .support-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-soft);
    }

    .support-output {
      margin-top: 16px;
      background: #ffffff;
    }

    .footer-summary,
    .pm-view-card {
      margin-top: 22px;
      background: var(--navy);
      color: #ffffff;
    }

    .footer-summary p,
    .pm-view-card p {
      margin-bottom: 0;
      font-weight: 750;
    }

    .pm-view-card {
      padding: clamp(18px, 3vw, 24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      box-shadow: var(--soft-shadow);
    }

    .pm-view-card h3 {
      margin-bottom: 4px;
      color: #ffffff;
    }

    .pm-subtitle {
      margin-bottom: 18px;
      color: rgba(255, 255, 255, 0.82);
    }

    .pm-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .pm-section {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
    }

    .pm-section strong {
      display: block;
      margin-bottom: 5px;
      color: #c6f6d5;
      font-size: 0.9rem;
    }

    .pm-section ul {
      margin: 0;
      padding-left: 18px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 750;
    }

    .pm-section.full {
      grid-column: 1 / -1;
    }

    .is-hidden {
      display: none;
    }

    @media (max-width: 1120px) {
      .summary-grid,
      .support-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pm-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 840px) {
      .demo-bar {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .demo-view {
        text-align: center;
      }

      .demo-sequence {
        white-space: normal;
      }

      .detail-body {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 18px, 1260px);
        padding: 18px 0 42px;
      }

      .shell {
        border-radius: 22px;
      }

      .language-toggle {
        position: static;
        margin: 0 auto 18px;
      }

      .summary-grid,
      .support-grid,
      .pm-grid {
        grid-template-columns: 1fr;
      }

      .summary-card {
        min-height: auto;
      }

      .hierarchy-card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header>
        <div class="language-toggle" aria-label="Language selector">
          <button type="button" id="langEn">EN</button>
          <button type="button" id="langKo" class="active">KR</button>
        </div>
        <h1 id="mainTitle">Healthcare AI Full-Stack Structure</h1>
        <p class="subtitle" id="mainSubtitle">Demo는 가로 흐름으로 단순하게, Production은 각 단계 아래에서 확장</p>
      </header>

      <section class="section" aria-labelledby="demo-title">
        <h2 id="demo-title" class="is-hidden">Demo Flow</h2>
        <div class="demo-bar demo-only">
          <strong id="demoBarLabel">Demo Flow</strong>
        </div>

        <div class="flow-scroll">
          <div class="flow-row" id="flowRow"></div>
          <div class="supporting-layers-band" id="supportingBandLabel">supporting layers</div>
        </div>
      </section>

      <section class="section" aria-labelledby="production-title">
        <div class="section-heading">
          <h2 id="production-title">Production Expansion</h2>
          <p id="productionSubtitle">각 demo 단계가 실제 서비스에서는 어떤 책임과 운영 요소로 확장되는지 (예시, healthcare)</p>
        </div>

        <div class="toolbar">
          <button type="button" class="button" id="expandAll">전체 펼치기</button>
          <button type="button" class="button secondary" id="collapseAll">전체 접기</button>
          <button type="button" class="button secondary" id="summaryToggle">최종 요약</button>
          <button type="button" class="button secondary" id="pmToggle">Project Management View</button>
        </div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="panel-wrap" id="detailWrap">
          <div class="panel-inner">
            <article class="detail-panel" id="detailPanel" aria-live="polite"></article>
          </div>
        </div>

        <div class="panel-wrap" id="supportWrap">
          <div class="panel-inner">
            <article class="support-panel" id="supportPanel"></article>
          </div>
        </div>

        <div class="panel-wrap" id="summaryWrap">
          <div class="panel-inner">
            <div class="footer-summary">
              <h3 id="finalSummaryTitle"></h3>
              <p id="footerSummaryText"></p>
            </div>
          </div>
        </div>

        <div class="panel-wrap" id="pmWrap">
          <div class="panel-inner">
            <article class="pm-view-card">
              <h3 id="pmViewTitle"></h3>
              <div id="pmViewContent"></div>
            </article>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const translations = {
      ko: {
        title: "Healthcare AI Full-Stack Structure",
        subtitle: "Demo는 가로 흐름으로 단순하게, Production은 각 단계 아래에서 확장",
        demoFlow: "Demo Flow",
        supportingLayersBand: "supporting layers",
        productionTitle: "Production Expansion",
        productionSubtitle: "각 demo 단계가 실제 서비스에서는 어떤 책임과 운영 요소로 확장되는지 (예시, healthcare)",
        expandAll: "전체 펼치기",
        collapseAll: "전체 접기",
        finalSummary: "최종 요약",
        projectManagementView: "Project Management View",
        clickForDetail: "자세히 보기",
        stageLabel: "Stage",
        closeDetail: "상세 패널 닫기",
        tabs: {
          overview: "개요",
          questions: "핵심 질문",
          hierarchy: "구성 요소"

    const detailPanel = document.getElementById("detailPanel");
    const supportWrap = document.getElementById("supportWrap");
    const supportPanel = document.getElementById("supportPanel");
    const summaryWrap = document.getElementById("summaryWrap");
    const pmWrap = document.getElementById("pmWrap");

    let activeStageId = null;

    function uiText() {
      return translations[currentLanguage];
    }

    function getStageText(stage) {
      const translated = stageTranslations[currentLanguage]?.[stage.id] || {};
      return {
        ...stage,
        flowSubtitle: translated.flowSubtitle || stage.flowSubtitle,
        subtitle: translated.subtitle || stage.subtitle,
        description: translated.description || stage.description,
        questions: translated.questions || stage.questions
      };
    }

    function renderStaticText() {
      const t = uiText();
      document.documentElement.lang = currentLanguage;
      document.title = t.title;
      document.getElementById("mainTitle").textContent = t.title;
      document.getElementById("mainSubtitle").textContent = t.subtitle;
      document.getElementById("demoBarLabel").textContent = t.demoFlow;
      document.getElementById("supportingBandLabel").textContent = t.supportingLayersBand;
      document.getElementById("production-title").textContent = t.productionTitle;
      document.getElementById("productionSubtitle").textContent = t.productionSubtitle;
      document.getElementById("expandAll").textContent = t.expandAll;
      document.getElementById("collapseAll").textContent = t.collapseAll;
      document.getElementById("summaryToggle").textContent = t.finalSummary;
      document.getElementById("pmToggle").textContent = t.projectManagementView;
      document.getElementById("finalSummaryTitle").textContent = t.finalSummaryTitle;
      document.getElementById("footerSummaryText").innerHTML = t.footerSummary;
      document.getElementById("pmViewTitle").textContent = t.pmViewTitle;
      document.getElementById("pmViewContent").innerHTML = t.pmViewHtml;
      document.getElementById("langEn").classList.toggle("active", currentLanguage === "en");
      document.getElementById("langKo").classList.toggle("active", currentLanguage === "ko");
    }

    function renderFlow() {
      flowRow.innerHTML = stages.filter((stage) => stage.id !== "supporting").map((stage) => {
        const text = getStageText(stage);
        return `
        <div class="flow-card" style="--accent:${stage.accent}">
          <div>
            <span class="flow-icon">${stage.icon}</span>
            <span class="flow-title">${stage.title}</span>
            <span class="flow-subtitle">${text.flowSubtitle}</span>
          </div>
        </div>
      `;
      }).join("");
    }

    function renderSummaryCards() {
      const t = uiText();
      summaryGrid.innerHTML = stages.map((stage) => {
        const text = getStageText(stage);
        return `
        <button class="summary-card" type="button" style="--accent:${stage.accent}" data-stage="${stage.id}" aria-expanded="false">
          <span class="summary-top">
            <span class="stage-number">${stage.number}</span>
            <span class="summary-icon">${stage.icon}</span>
          </span>
          <h3>${stage.title}</h3>
          <p>${text.subtitle}</p>
          <ul class="preview-list">
            ${stage.preview.map((item) => `<li>${item}</li>`).join("")}
          </ul>
          <span class="card-action">${t.clickForDetail}</span>
        </button>
      `;
      }).join("");
    }

    function getHierarchyDetail(item) {
      let detail = hierarchyDetails[item] || {
        icon: "•",
        subtitle: "구성 요소",
        role: hierarchyDescriptions[item] || "Production 구조 안에서 필요한 세부 요소입니다.",
        dataAccess: "해당 단계에서 필요한 데이터나 상태 정보를 처리합니다.",
        functions: "서비스 흐름을 안정적으로 연결하고 지원합니다.",
        example: "AI 헬스케어 서비스에서 전체 요청 흐름의 일부로 사용됩니다.",
        keyPoint: "권한, 보안, 추적 가능성을 함께 고려해야 합니다."
      };
      if (currentLanguage === "en") {
        const en = detailTranslations.en[item] || englishFallbackDetail(item);
        if (Array.isArray(en)) {
          detail = {
            icon: detail.icon || "•",
            title: en[0],
            subtitle: en[1],
            role: en[2],
            dataAccess: en[3],
            functions: en[4],
            example: en[5],
            keyPoint: en[6]
          };
        } else {
          detail = en;
        }
      }
      return {
        title: detail.title || item,
        icon: detail.icon || "•",
        subtitle: detail.subtitle || "구성 요소",
        role: detail.role || hierarchyDescriptions[item] || supportDescriptions[item] || "Production 구조 안에서 필요한 세부 요소입니다.",
        dataAccess: detail.dataAccess || detail.handledData || "해당 단계에서 필요한 데이터나 상태 정보를 처리합니다.",
        mainFunctions: detail.mainFunctions || detail.functions || "서비스 흐름을 안정적으로 연결하고 지원합니다.",
        healthcareExample: detail.healthcareExample || detail.example || "AI 헬스케어 서비스에서 전체 요청 흐름의 일부로 사용됩니다.",
        keyPoint: detail.keyPoint || "권한, 보안, 추적 가능성을 함께 고려해야 합니다.",
        relatedExamples: detail.relatedExamples || relatedExamplesByItem[item] || ["Documentation", "Best Practice", "Security Review"]
      };
    }

    function renderHierarchyDetail(item) {
      const detail = getHierarchyDetail(item);
      const labels = uiText().detailLabels;
      return `
        <div class="selected-detail">
          <div>
            <div class="selected-detail-title">${detail.icon} ${detail.title}</div>
            <div class="hierarchy-card-subtitle">${detail.subtitle}</div>
          </div>
          <div class="detail-row">
            <span class="detail-row-label">${labels.role}</span>
            <span class="detail-row-text">${detail.role}</span>
          </div>
          <div class="detail-row">
            <span class="detail-row-label">${labels.dataAccess}</span>
            <span class="detail-row-text">${detail.dataAccess}</span>
          </div>
          <div class="detail-row">
            <span class="detail-row-label">${labels.mainFunctions}</span>
            <span class="detail-row-text">${detail.mainFunctions}</span>
          </div>
          <div class="detail-row">
            <span class="detail-row-label">${labels.healthcareExample}</span>
            <span class="detail-row-text">${detail.healthcareExample}</span>
          </div>
          <div class="detail-row">
            <span class="detail-row-label">${labels.keyPoint}</span>
            <span class="detail-row-text">${detail.keyPoint}</span>
          </div>
          <div class="related-examples-box">
            <span class="related-examples-title">${labels.relatedExamples}</span>
            <div class="related-tag-row">
              ${detail.relatedExamples.map((example) => `<span class="related-tag">${example}</span>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function getTabHtml(stage) {
      const t = uiText();
      const text = getStageText(stage);
      return `
        <div class="detail-tabs" role="tablist" aria-label="${stage.title} detail tabs">
          <button type="button" class="detail-tab ${activeTabId === "overview" ? "active" : ""}" data-tab="overview">${t.tabs.overview}</button>
          <button type="button" class="detail-tab ${activeTabId === "questions" ? "active" : ""}" data-tab="questions">${t.tabs.questions}</button>
          <button type="button" class="detail-tab ${activeTabId === "hierarchy" ? "active" : ""}" data-tab="hierarchy">${t.tabs.hierarchy}</button>
        </div>
        <div class="info-card">
          <div class="tab-content ${activeTabId === "overview" ? "active" : ""}" data-content="overview">
            <h3>${t.tabs.overview}</h3>
            <p>${text.description}</p>
          </div>
          <div class="tab-content ${activeTabId === "questions" ? "active" : ""}" data-content="questions">
            <h3>${t.tabs.questions}</h3>
            <ul class="text-list">${text.questions.map((item) => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="tab-content ${activeTabId === "hierarchy" ? "active" : ""}" data-content="hierarchy">
            <h3>${t.componentsTitle}</h3>
            <p class="hierarchy-helper">${t.componentsHelper}</p>
            <div class="hierarchy-card-grid">
              ${stage.hierarchy.map((item, index) => `
                <button type="button" class="hierarchy-card-button hierarchy-chip ${(selectedItemByStage[stage.id] || stage.hierarchy[0]) === item ? "active" : ""}" data-item="${item}">
                  <span class="hierarchy-card-icon">${getHierarchyDetail(item).icon}</span>
                  <span>
                    <span class="hierarchy-card-name">${getHierarchyDetail(item).title}</span>
                    <span class="hierarchy-card-subtitle">${getHierarchyDetail(item).subtitle}</span>
                  </span>
                </button>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderDetail(stage) {
      const t = uiText();
      const text = getStageText(stage);
      activeStageId = stage.id;
      const selectedItem = selectedItemByStage[stage.id] || stage.hierarchy[0];
      selectedItemByStage[stage.id] = selectedItem;
      detailPanel.style.setProperty("--panel-accent", stage.accent);
      detailPanel.innerHTML = `
        <div class="detail-header">
          <div>
            <p class="detail-kicker">${t.stageLabel} ${stage.number}</p>
            <h2>${stage.icon} ${stage.title}</h2>
            <p>${text.subtitle}</p>
          </div>
          <button class="close-button" type="button" aria-label="${t.closeDetail}" id="closeDetail">×</button>
        </div>
        <div class="detail-body">
          <div>${getTabHtml(stage)}</div>
          <aside class="hierarchy-box">
            <h3>${t.detailTitle}</h3>
            <div class="hierarchy-output" id="hierarchyOutput">
              ${renderHierarchyDetail(selectedItem)}
            </div>
          </aside>
        </div>
      `;

      detailWrap.classList.add("open");
      supportWrap.classList.remove("open");
      summaryWrap.classList.remove("open");
      pmWrap.classList.remove("open");
      updateToggleButtons();
      updateActiveCards(stage.id);
      bindDetailPanelEvents();
    }

    function updateActiveCards(stageId) {
      document.querySelectorAll(".summary-card").forEach((card) => {
        const isActive = card.dataset.stage === stageId && detailWrap.classList.contains("open");
        card.classList.toggle("active", isActive);
        card.setAttribute("aria-expanded", String(isActive));
      });
    }

    function closeDetail() {
      detailWrap.classList.remove("open");
      activeStageId = null;
      updateActiveCards("");
    }

    function bindDetailPanelEvents() {
      document.getElementById("closeDetail").addEventListener("click", closeDetail);

      function setSelectedDetail(chip, selector) {
        const item = chip.dataset.item;
        if (activeStageId) {
          selectedItemByStage[activeStageId] = item;
        }
        detailPanel.querySelectorAll(selector).forEach((entry) => entry.classList.remove("active"));
        chip.classList.add("active");
        const output = document.getElementById("hierarchyOutput");
        output.style.opacity = "0";
        window.setTimeout(() => {
          output.innerHTML = renderHierarchyDetail(item);
          output.style.opacity = "1";
        }, 120);
      }

      detailPanel.querySelectorAll(".detail-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          const target = tab.dataset.tab;
          activeTabId = target;
          detailPanel.querySelectorAll(".detail-tab").forEach((item) => item.classList.toggle("active", item === tab));
          detailPanel.querySelectorAll(".tab-content").forEach((content) => {
            content.classList.toggle("active", content.dataset.content === target);
          });
          if (target === "hierarchy") {
            const firstChip = detailPanel.querySelector(".hierarchy-chip");
            if (firstChip) {
              setSelectedDetail(firstChip, ".hierarchy-chip");
            }
          }
        });
      });

      detailPanel.querySelectorAll(".hierarchy-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          setSelectedDetail(chip, ".hierarchy-chip");
        });
      });

    }

    function renderSupportPanel() {
      supportPanel.innerHTML = `
        <div class="detail-header">
          <div>
            <p class="detail-kicker">Supporting Layers</p>
            <h2>전체 서비스에 걸친 운영·보안·배포·모니터링</h2>
            <p>아래 항목을 클릭하면 짧은 설명이 표시됩니다.</p>
          </div>
          <button class="close-button" type="button" aria-label="Close supporting layers" id="closeSupport">×</button>
        </div>
        <div class="support-grid">
          ${Object.entries(supportGroups).map(([group, items]) => `
            <div class="support-card">
              <h3>${group}</h3>
              <div class="chip-row">
                ${items.map((item) => `<button type="button" class="chip support-chip" data-item="${item}">${item}</button>`).join("")}
              </div>
            </div>
          `).join("")}
        </div>
        <div class="support-output" id="supportOutput">Supporting Layers의 항목을 클릭하면 설명과 관련 예시가 여기에 표시됩니다.</div>
      `;

      document.getElementById("closeSupport").addEventListener("click", () => supportWrap.classList.remove("open"));
      supportPanel.querySelectorAll(".support-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          supportPanel.querySelectorAll(".support-chip").forEach((item) => item.classList.remove("active"));
          chip.classList.add("active");
          const item = chip.dataset.item;
          document.getElementById("supportOutput").innerHTML = renderHierarchyDetail(item);
        });
      });
    }

    function toggleSupport() {
      const shouldOpen = !supportWrap.classList.contains("open");
      supportWrap.classList.toggle("open", shouldOpen);
      if (shouldOpen) {
        closeDetail();
        summaryWrap.classList.remove("open");
        pmWrap.classList.remove("open");
        renderSupportPanel();
      }
      updateToggleButtons();
    }

    function toggleSummary() {
      const shouldOpen = !summaryWrap.classList.contains("open");
      summaryWrap.classList.toggle("open", shouldOpen);
      if (shouldOpen) {
        closeDetail();
        supportWrap.classList.remove("open");
        pmWrap.classList.remove("open");
      }
      updateToggleButtons();
    }

    function togglePmView() {
      const shouldOpen = !pmWrap.classList.contains("open");
      pmWrap.classList.toggle("open", shouldOpen);
      if (shouldOpen) {
        closeDetail();
        supportWrap.classList.remove("open");
        summaryWrap.classList.remove("open");
      }
      updateToggleButtons();
    }

    function updateToggleButtons() {
      document.getElementById("summaryToggle").classList.toggle("active", summaryWrap.classList.contains("open"));
      document.getElementById("pmToggle").classList.toggle("active", pmWrap.classList.contains("open"));
    }

    function setLanguage(language) {
      if (currentLanguage === language) return;
      currentLanguage = language;
      renderStaticText();
      renderFlow();
      renderSummaryCards();
      updateActiveCards(activeStageId || "");
      if (detailWrap.classList.contains("open") && activeStageId) {
        const activeStage = stages.find((stage) => stage.id === activeStageId);
        if (activeStage) {
          renderDetail(activeStage);
        }
      } else {
        updateActiveCards(activeStageId || "");
      }
      updateToggleButtons();
    }

    function expandAllPreviews() {
      const firstStage = stages[0];
      renderDetail(firstStage);
    }

    function collapseAll() {
      closeDetail();
      supportWrap.classList.remove("open");
      summaryWrap.classList.remove("open");
      pmWrap.classList.remove("open");
      document.querySelectorAll(".summary-card").forEach((card) => {
        card.classList.remove("active");
        card.setAttribute("aria-expanded", "false");
      });
      updateToggleButtons();
    }

    function bindMainEvents() {
      document.getElementById("langEn").addEventListener("click", () => setLanguage("en"));
      document.getElementById("langKo").addEventListener("click", () => setLanguage("ko"));

      summaryGrid.addEventListener("click", (event) => {
        const card = event.target.closest(".summary-card");
        if (!card) return;
        const stage = stages.find((item) => item.id === card.dataset.stage);
        if (activeStageId === stage.id && detailWrap.classList.contains("open")) {
          closeDetail();
          return;
        }
        renderDetail(stage);
        detailPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      document.getElementById("expandAll").addEventListener("click", expandAllPreviews);
      document.getElementById("collapseAll").addEventListener("click", collapseAll);
      document.getElementById("summaryToggle").addEventListener("click", toggleSummary);
      document.getElementById("pmToggle").addEventListener("click", togglePmView);
    }

    renderStaticText();
    renderFlow();
    renderSummaryCards();
    bindMainEvents();
  </script>
</body>
</html>
